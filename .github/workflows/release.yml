name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust-target: 'aarch64-apple-darwin'
            macos-target: '11'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust-target: 'x86_64-apple-darwin'
            macos-target: '10.13'
          - platform: 'ubuntu-24.04'
            args: ''
            rust-target: ''
          - platform: 'windows-latest'
            args: ''
            rust-target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            BODY=$(git log --pretty=format:"- %s" "${PREV}..HEAD")
          else
            BODY=$(git log --pretty=format:"- %s")
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get remove -y libappindicator3-1 || true
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos-target }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cosmog ${{ github.ref_name }}'
          releaseBody: "${{ steps.changelog.outputs.body }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  android:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27
        run: sdkmanager "ndk;27.1.12297006"

      # Only the two targets users actually need: arm64 for real phones (~95%
      # of Android devices), x86_64 for emulators and some Chromebooks.
      # Building all 4 ABIs into a universal APK produces a ~165 MB file;
      # two single-ABI APKs are ~40 MB each.
      - name: Setup Rust (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm ci

      - name: Write signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
        if: env.KEYSTORE_B64 != ''
        run: |
          echo "$KEYSTORE_B64" | base64 -d > src-tauri/gen/android/release.jks
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEYSTORE_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEYSTORE_KEY_PASSWORD }}
          EOF

      - name: Build arm64 APK (phones)
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.1.12297006

      - name: Rename arm64 APK
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk/ -name "*.apk" | head -1)
          cp "$APK" /tmp/cosmog-arm64.apk

      - name: Build x86_64 APK (emulator)
        run: npx tauri android build --apk --target x86_64
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.1.12297006

      - name: Rename x86_64 APK
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk/ -name "*.apk" | head -1)
          cp "$APK" /tmp/cosmog-x86_64.apk

      - name: Upload APKs to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          gh release upload "$TAG" \
            "/tmp/cosmog-arm64.apk#Cosmog-${TAG}-android-arm64.apk" \
            "/tmp/cosmog-x86_64.apk#Cosmog-${TAG}-android-x86_64.apk" \
            --clobber
