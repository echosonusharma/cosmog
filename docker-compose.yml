services:
  minio:
    image: minio/minio:latest
    container_name: cosmog-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: cosmogtest
      MINIO_ROOT_PASSWORD: cosmogtest123
      MINIO_REGION_NAME: us-east-1
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 20

volumes:
  minio-data:
